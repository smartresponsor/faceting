manifest:
  id: faceting.canon
  version: 2
  status: active
  normative_strength: mandatory

component_identity:
  repository_name: faceting
  canonical_code_root_namespace: App
  canonical_code_root_path: src/
  forbidden_root_namespaces:
    - Smartresponsor
    - Faceting

structure_rules:
  forbidden_directories:
    - /Domain
    - src/Domain

service_rules:
  implementation_root: src/Service
  interface_root: src/ServiceInterface
  interfaces_inside_service_tree_forbidden: true
  component_local_service_prefix: Faceting
  service_suffix: Service

configuration_rules:
  config_prefix: faceting_
